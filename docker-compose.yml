
services:
 
  app:
    build: .
    container_name: flowzone-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flowzone
 
  postgres:
    image: postgres:15-alpine
    container_name: flowzone-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: flowzone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flowzone"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - flowzone
 
volumes:
  postgres_data:
  storage_logs:
 
networks:
  flowzone:
    driver: bridge
 