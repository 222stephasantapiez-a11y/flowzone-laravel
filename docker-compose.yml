services:
  laravel-app:
    build: .
    container_name: flowzone-app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - storage-public:/var/www/html/storage/app/public
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_DATABASE=flowzone
      - DB_USERNAME=postgres
      - DB_PASSWORD=12345
      - PHP_CLI_SERVER_WORKERS=4`n    depends_on:
      - postgres-db
    networks:
      - flowzone-network

  postgres-db:
    image: postgres:15
    container_name: flowzone-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=flowzone
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - flowzone-network

volumes:
  postgres-data:
    driver: local
  storage-public:
    driver: local

networks:
  flowzone-network:
    driver: bridge

